# Happy Jump — SonarQube + Jenkins (laboratorio CI local)
# Uso: cd infra/docker && docker compose up -d --build
# Datos persistentes: volumen Docker o HAPPYJUMP_CI_DATA (opcional)

name: happyjump-ci

services:
  sonar-db:
    image: postgres:16
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_WEB_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_CE_JAVAOPTS: "-Xmx512m -Xms256m"
      SONAR_ES_JAVAOPTS: "-Xmx512m -Xms256m"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 15
      start_period: 300s

  jenkins:
    build:
      context: ../jenkins
      dockerfile: Dockerfile
    group_add:
      - "0"
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
      - ../../:/workspace/apphappy
      - deploy-runtime:/var/jenkins_home/servers/happyjump
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      SONAR_HOST_URL: http://sonarqube:9000
      DOCKER_NETWORK: happyjump-ci_default
      JENKINS_HOST_WORKSPACE_ROOT: /var/jenkins_home/workspace
      DOCKER_REPO_PATH: /workspace/apphappy
      GRADLE_USER_HOME: /var/jenkins_home/.gradle
      NPM_CONFIG_CACHE: /var/jenkins_home/.npm
      JAVA_OPTS: "-Xmx1024m"
    depends_on:
      sonarqube:
        condition: service_started

volumes:
  sonar-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  jenkins-home:
  deploy-runtime:
