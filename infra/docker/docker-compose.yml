# Happy Jump — SonarQube + Jenkins (datos en disco D: vía carpetas ./data/)

# Uso: cd D:\apphappy\infra\docker && docker compose up -d

# Ver: docs/GUIA_JENKINS_CI_CD.md



name: happyjump-ci



services:

  sonar-db:

    image: postgres:16

    environment:

      POSTGRES_USER: sonar

      POSTGRES_PASSWORD: sonar

      POSTGRES_DB: sonar

    volumes:

      - ./data/sonar-db:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]

      interval: 10s

      timeout: 5s

      retries: 5



  sonarqube:

    image: sonarqube:community

    depends_on:

      sonar-db:

        condition: service_healthy

    ports:

      - "9000:9000"

    environment:

      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar

      SONAR_JDBC_USERNAME: sonar

      SONAR_JDBC_PASSWORD: sonar

    volumes:

      - ./data/sonarqube/data:/opt/sonarqube/data

      - ./data/sonarqube/extensions:/opt/sonarqube/extensions

      - ./data/sonarqube/logs:/opt/sonarqube/logs

    healthcheck:

      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP || exit 1"]

      interval: 30s

      timeout: 10s

      retries: 10

      start_period: 120s



  jenkins:

    build:

      context: ../jenkins

      dockerfile: Dockerfile

    ports:

      - "8081:8080"

      - "50000:50000"

    volumes:

      - ./data/jenkins_home:/var/jenkins_home

      - ../../:/workspace/apphappy:ro

      - ../../deploy-runtime:/var/jenkins_home/servers/happyjump

      - /var/run/docker.sock:/var/run/docker.sock

    environment:

      DOCKER_HOST: unix:///var/run/docker.sock

      SONAR_HOST_URL: http://sonarqube:9000

      GRADLE_USER_HOME: /var/jenkins_home/.gradle

      NPM_CONFIG_CACHE: /var/jenkins_home/.npm

    depends_on:

      sonarqube:

        condition: service_healthy


