# SonarQube local (Docker) — NO subas tokens a Git
# Uso: ./gradlew sonar -Dproject.settings=sonar-project.local.properties
# O en Jenkins: ver Jenkinsfile (projectKey happyjump-local)

sonar.projectKey=happyjump-local
sonar.projectName=Happy Jump (local)
sonar.host.url=http://localhost:9000

# Genera el token en SonarQube → My Account → Security → Generate Tokens
# sonar.token=TU_TOKEN_AQUI

sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
sonar.java.binaries=app/build/tmp/kotlin-classes/debug
