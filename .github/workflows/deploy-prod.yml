# CD producción: push a main ? tests ? webhook HTTPS ? GET /health
# Secrets: HAPPYJUMP_DEPLOY_TOKEN | Opcional: HAPPYJUMP_PUBLIC_URL
name: Deploy API (prod)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'ci/trigger-deploy-webhook.sh'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run test:ci

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Disparar deploy (webhook HTTPS)
        env:
          HAPPYJUMP_DEPLOY_TOKEN: ${{ secrets.HAPPYJUMP_DEPLOY_TOKEN }}
          HAPPYJUMP_PUBLIC_URL: ${{ vars.HAPPYJUMP_PUBLIC_URL || secrets.HAPPYJUMP_PUBLIC_URL || 'https://happyjump.sorbits.site' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x ci/trigger-deploy-webhook.sh
          ./ci/trigger-deploy-webhook.sh
