name: Deploy production API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-prod.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install & test API
        working-directory: server
        run: |
          npm ci
          npm test --if-present

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Empaquetar API
        run: |
          mkdir -p dist
          tar -czf dist/happyjump-api.tar.gz \
            -C . \
            --exclude='server/node_modules' \
            --exclude='server/.env' \
            server/

      - name: Deploy HTTPS
        env:
          DEPLOY_URL: ${{ vars.HAPPYJUMP_PUBLIC_URL || 'https://happyjump.sorbits.site/' }}
          DEPLOY_TOKEN: ${{ secrets.HAPPYJUMP_DEPLOY_TOKEN }}
        run: |
          BASE="${DEPLOY_URL%/}"
          curl -sfS -X POST "${BASE}/internal/deploy" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -F "file=@dist/happyjump-api.tar.gz"

      - name: Health check
        env:
          DEPLOY_URL: ${{ vars.HAPPYJUMP_PUBLIC_URL || 'https://happyjump.sorbits.site/' }}
        run: curl -sf "${DEPLOY_URL%/}/health"
