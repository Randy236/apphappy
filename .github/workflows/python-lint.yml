# Análisis estático Python (scripts de informes Postman, k6, ZAP, auditoría)
name: Python Lint (flake8)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-lint.txt

      - name: Instalar flake8
        run: pip install -r scripts/requirements-lint.txt

      - name: flake8 (scripts/)
        run: python -m flake8 scripts
