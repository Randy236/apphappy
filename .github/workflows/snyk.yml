# Snyk deshabilitado en CI (no corre en push/PR).
# Para ejecutar manual: Actions → Snyk Security → Run workflow
# Requiere SNYK_TOKEN en Settings → Secrets → Actions
name: Snyk Security

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-skipped:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Snyk omitido en CI. Ejecutar manualmente si se necesita."
