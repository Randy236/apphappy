# Requiere secret SNYK_TOKEN en GitHub: Settings → Secrets → Actions
# Cómo obtener token: https://app.snyk.io/account (Auth token / Service accounts)
name: Snyk Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-gradle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: snyk/actions/setup@master

      # Escanea dependencias Gradle (raíz + subproyectos). No sustituye el análisis en snyk.io.
      - name: Snyk test (Gradle)
        run: snyk test --all-projects --severity-threshold=medium
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
