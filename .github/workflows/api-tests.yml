# Pruebas unitarias de la API Node (server/) — mismo comando que Jenkins: npm run test:ci
name: API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: server

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Pruebas unitarias (test:ci)
        run: npm run test:ci
