# Cobertura en SonarCloud: corre tests + JaCoCo y luego envía el XML.
# 1) SonarCloud → proyecto → Administration → Analysis Method → DESACTIVAR Automatic Analysis
#    (si no, Gradle falla: "manual analysis while Automatic Analysis is enabled")
# 2) SonarCloud: Account → Security → genera SONAR_TOKEN
# 3) GitHub: Settings → Secrets → Actions → SONAR_TOKEN
#    exactos de: SonarCloud → proyecto → Administration → Update Key
name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Pruebas unitarias API (Node, ítem 5)
        working-directory: server
        run: npm ci --ignore-scripts && npm run test:ci && npm run coverage:verify

      # Más heap que gradle.properties local (1536m) evita que el daemon muera en CI al compilar + tests.
      - name: Pruebas unitarias Android + informe JaCoCo
        run: chmod +x gradlew && ./gradlew -Dorg.gradle.jvmargs="-Xmx2560m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" :app:testDebugUnitTest :app:jacocoTestReport :app:printJacocoTotals --no-daemon

      - name: Verificar JaCoCo (sin esto Sonar muestra "Coverage No data")
        run: |
          test -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          echo "JaCoCo XML: $(wc -c < app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml) bytes"
          test -d app/build/tmp/kotlin-classes/debug && echo "kotlin-classes OK" || echo "WARN kotlin-classes"

      - name: Comprobar SONAR_TOKEN
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Crea el secreto SONAR_TOKEN en GitHub → Settings → Secrets → Actions"
            echo "Token en https://sonarcloud.io → My Account → Security → Generate Token"
            exit 1
          fi
          http_code=$(curl -s -o /tmp/sonar-validate.json -w "%{http_code}" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "https://sonarcloud.io/api/authentication/validate")
          if [ "$http_code" != "200" ]; then
            echo "::error::SONAR_TOKEN rechazado por SonarCloud (HTTP $http_code). Genera token nuevo con cuenta Randy236."
            cat /tmp/sonar-validate.json || true
            exit 1
          fi
          echo "SONAR_TOKEN válido para SonarCloud"

      # Sonar recomienda plugin Gradle (no sonarcloud-github-action) en proyectos Android/Gradle
      - name: Subir análisis y cobertura (Gradle sonar)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew sonar --no-daemon --info \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=Randy236_apphappy \
            -Dsonar.organization=randy236 \
            -Dsonar.token="$SONAR_TOKEN" \
            2>&1 | tee sonar-log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Gradle sonar falló. Revisa sonar-log.txt (host, token o Automatic Analysis)"
            grep -i "error\|unauthorized\|quality gate\|localhost:9000\|can not be reached" sonar-log.txt | tail -30 || true
            exit 1
          fi
          echo "=== Log Sonar (cobertura / JaCoCo) ==="
          grep -iE "jacoco|coverage|imported|sensor.*java" sonar-log.txt | tail -25 || true
          if ! grep -qi "jacocoTestReport.xml" sonar-log.txt; then
            echo "::warning::No se ve jacocoTestReport.xml en el log; revisa sonar.coverage.jacoco.xmlReportPaths"
          fi

      - name: Guardar log Sonar (depuración)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-log
          path: sonar-log.txt
          retention-days: 7

      - name: Guardar informe JaCoCo (evidencia ítem 3)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html
          path: app/build/reports/jacoco/jacocoTestReport/
          retention-days: 14
