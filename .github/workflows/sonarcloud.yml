# Cobertura en SonarCloud: corre tests + JaCoCo y luego envía el XML.
# 1) En SonarCloud: Account → Security → genera un token (Analysis / SonarQube Cloud).
# 2) En GitHub del repo: Settings → Secrets → Actions → SONAR_TOKEN
# 3) Si el análisis falla por "project key", edita sonar-project.properties con los valores
#    exactos de: SonarCloud → proyecto → Administration → Update Key
name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      # Más heap que gradle.properties local (1536m) evita que el daemon muera en CI al compilar + tests.
      - name: Pruebas unitarias + informe JaCoCo
        run: chmod +x gradlew && ./gradlew -Dorg.gradle.jvmargs="-Xmx2560m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" :app:testDebugUnitTest :app:jacocoTestReport :app:printJacocoTotals --no-daemon

      - name: Verificar JaCoCo (sin esto Sonar muestra "Coverage No data")
        run: |
          test -f app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          echo "JaCoCo XML: $(wc -c < app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml) bytes"
          test -d app/build/tmp/kotlin-classes/debug && echo "kotlin-classes OK" || echo "WARN kotlin-classes"

      - name: Comprobar SONAR_TOKEN
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "::error::Crea el secreto SONAR_TOKEN en GitHub → Settings → Secrets → Actions"
            echo "Token en https://sonarcloud.io → My Account → Security → Generate Token"
            exit 1
          fi
          echo "SONAR_TOKEN configurado"

      # Sonar recomienda plugin Gradle (no sonarcloud-github-action) en proyectos Android/Gradle
      - name: Subir análisis y cobertura (Gradle sonar)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew sonar --no-daemon --info 2>&1 | tee sonar-log.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Gradle sonar falló. Busca ERROR en sonar-log.txt (suele ser SONAR_TOKEN inválido)"
            grep -i "error\|unauthorized\|quality gate" sonar-log.txt | tail -30 || true
            exit 1
          fi

      - name: Guardar informe JaCoCo (evidencia ítem 3)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html
          path: app/build/reports/jacoco/jacocoTestReport/
          retention-days: 14
