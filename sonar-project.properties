# SonarCloud — copia sonar.projectKey y sonar.organization desde:
# https://sonarcloud.io → tu proyecto apphappy → Administration → Update Key (o "Analyze with GitHub")
sonar.projectKey=Randy236_apphappy
sonar.organization=randy236
sonar.host.url=https://sonarcloud.io

# Cobertura: generar antes con :app:jacocoTestReport (CI o local)
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
sonar.junit.reportPaths=app/build/test-results/testDebugUnitTest

# Fuentes del módulo app (Kotlin bajo java/)
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java
sonar.sourceEncoding=UTF-8

# Bytecode (Kotlin + Java compilado) — necesario para que Sonar lea el XML de JaCoCo
sonar.java.binaries=app/build/tmp/kotlin-classes/debug,app/build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
