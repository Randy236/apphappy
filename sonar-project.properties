# SonarCloud — copia sonar.projectKey y sonar.organization desde:
# https://sonarcloud.io → tu proyecto apphappy → Administration → Update Key (o "Analyze with GitHub")
sonar.projectKey=Randy236_apphappy
sonar.organization=randy236
sonar.host.url=https://sonarcloud.io

# Ya compiló :app:testDebugUnitTest en CI
sonar.gradle.skipCompile=true

# Rutas absolutas las resuelve Gradle en build.gradle.kts (JaCoCo, Lint, Kotlin).
sonar.coverage.jacoco.xmlReportPaths=**/jacocoTestReport.xml
sonar.androidLint.reportPaths=**/lint-results-debug.xml
sonar.junit.reportPaths=**/test-results/testDebugUnitTest

sonar.sourceEncoding=UTF-8

# Bytecode (Kotlin + Java compilado) — necesario para que Sonar lea el XML de JaCoCo
sonar.java.binaries=**/kotlin-classes/debug,**/compileDebugJavaWithJavac/classes

# Cobertura: solo ui.util (pruebas JVM). Pantallas Compose y ViewModels quedan fuera.
sonar.coverage.exclusions=**/R.class,**/R$*.class,**/BuildConfig.*,**/Manifest*.*,**/ui/admin/**,**/ui/cancha/**,**/ui/login/**,**/ui/main/**,**/ui/perfil/**,**/ui/salones/**,**/ui/components/**,**/ui/theme/**,**/viewmodel/**,**/data/**,**/export/**,**/notifications/**,**/work/**,**/HappyJumpApp.kt,**/MainActivity.kt

sonar.exclusions=**/src/debug/**,**/debug/**,tools/sonar-informe/**,**/AppDispatchers.kt,**/HappyJumpApp.kt
sonar.issue.ignore.multicriteria=compose_cc,compose_params,gradle_lock
sonar.issue.ignore.multicriteria.gradle_lock.ruleKey=text:S8569
sonar.issue.ignore.multicriteria.gradle_lock.resourceKey=**/build.gradle.kts
sonar.issue.ignore.multicriteria.compose_cc.ruleKey=kotlin:S3776
sonar.issue.ignore.multicriteria.compose_cc.resourceKey=**/ui/**/*.kt
sonar.issue.ignore.multicriteria.compose_params.ruleKey=kotlin:S107
sonar.issue.ignore.multicriteria.compose_params.resourceKey=**/ui/**/*.kt
